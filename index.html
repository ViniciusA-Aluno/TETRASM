<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetrasm</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nabla&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-layout">
        <div></div>
        <div id="game-container">
            <!-- Botões de Controle no canto do monitor -->
            <button id="btn-settings" class="btn-settings" title="Configurações do Sistema">⚙️</button>
            <button id="btn-main-menu" class="btn-main-menu" title="Menu Principal">🏠</button>

            <!-- Tela Inicial (Main Menu) -->
            <div id="main-menu-overlay" class="menu-overlay">
                <div class="menu-container">
                    <h1 class="menu-title">TETRASM</h1>
                    
                    <ul id="menu-options-list" class="menu-list">
                        <li class="menu-item active" data-action="start">
                            <span class="menu-arrow">▶</span> Iniciar Partida
                        </li>
                        <li class="menu-item" data-action="custom-seed">
                            <span class="menu-arrow">&nbsp;</span> Partida Personalizada
                        </li>
                        <li class="menu-item" data-action="settings">
                            <span class="menu-arrow">&nbsp;</span> Configurações
                        </li>
                        <li class="menu-item" data-action="help">
                            <span class="menu-arrow">&nbsp;</span> Ajuda
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Barra Superior (Registradores) -->
            <div id="registers-container">
                <div class="register target-register" id="reg-target">
                    <div class="tag">ALVO</div>
                    <div class="register-label"></div>
                    <div id="grid-target" class="piece-grid"></div>
                </div>
                <div class="register" id="reg-r0">
                    <div class="tag">R0</div>
                    <div class="register-label">R0</div>
                    <div id="grid-r0" class="piece-grid"></div>
                </div>
            </div>

            <!-- Acumuladores A e B, e Pilha P no centro -->
            <div id="accumulators-container">
                <div id="acc-group">
                    <div class="accumulator accumulator-a" id="acc-a">
                        <div class="tag">A</div>
                        <div class="accumulator-label">A</div>
                        <div id="grid-a" class="piece-grid"></div>
                    </div>
                    <div class="accumulator accumulator-b" id="acc-b">
                        <div class="tag">B</div>
                        <div class="accumulator-label">B</div>
                        <div id="grid-b" class="piece-grid"></div>
                    </div>
                </div>
                <div class="accumulator accumulator-p" id="acc-p">
                    <div class="tag">P</div>
                    <div class="accumulator-label">P</div>
                    <div id="grid-p" class="piece-grid"></div>
                </div>
            </div>
            
            <!-- Barra inferior de cartas -->
            <div id="cards-container">
                <!-- Cards múltiplos gerados via script.js -->
            </div>

            <!-- Janela / Pop-up Abstrato dentro do Game Container -->
            <div id="game-dialog-overlay" class="game-dialog-overlay" style="display: none;">
                <div id="game-dialog-card" class="game-dialog-card">
                    <div id="game-dialog-header" class="game-dialog-header">
                        <span id="game-dialog-title">TÍTULO</span>
                        <button class="win95-close-btn" onclick="closeDialog()" title="Fechar">×</button>
                    </div>
                    <div id="game-dialog-body" class="game-dialog-body">
                        <!-- Conteúdo dinâmico -->
                    </div>
                    <div id="game-dialog-footer" class="game-dialog-footer">
                        <!-- Botões dinâmicos -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Painel do Caderno de Comandos -->
        <div id="notebook-panel">
            <div class="window-header" id="notebook-header">
                <h3>Caderno de Comandos</h3>
                <button id="btn-toggle-side" class="win-btn" title="Mover para Esquerda">&lt;</button>
            </div>
            <div class="window-body notebook-paper">
                <div id="line-highlight" class="notebook-line-highlight"></div>
                <textarea id="notebook-input" class="notebook-textarea" placeholder="Digite comandos de Assembly aqui...&#10;&#10;Exemplo:&#10;MOV A, C0&#10;MOV B, C1&#10;MOV R0, A&#10;&#10;Use SYSCALL para comparar R0 ao alvo.&#10;&#10;Use HELP para ver todos os comandos."></textarea>
                <div id="notebook-status" class="notebook-status">Pronto</div>
                <div class="notebook-controls">
                    <button id="btn-run" class="notebook-btn" title="Executar todo o código">▶ Executar</button>
                    <button id="btn-step" class="notebook-btn" title="Executar linha por linha">⏭ Passo</button>
                    <button id="btn-reset" class="notebook-btn" title="Reiniciar nível atual">↺ Resetar</button>
                    <button id="btn-new-target" class="notebook-btn" title="Gerar novas peças e alvo">🎲 Novo Alvo</button>
                    <button id="btn-help" class="notebook-btn" title="Mostrar comandos disponíveis">❓ Ajuda</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="ui.js"></script>
    <script src="sound.js"></script>
    <script src="dialog.js"></script>
    <script src="animation.js"></script>
    <script src="docking.js"></script>
    <script src="script.js"></script>
</body>
</html>
